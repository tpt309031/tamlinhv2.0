<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC energy</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <script src="script.js" defer></script>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">DAILY INDEX</p>
      <h1>only for research</h1>
      <p class="subtitle">via @tpt309031</p>
    </header>

    <section class="toolbar card" aria-label="Bộ lọc dữ liệu">
      <label>
        <span>Năm</span>
        <select id="year"></select>
      </label>
      <label>
        <span>Tháng</span>
        <select id="month">
          <option value="1">Tháng 1</option>
          <option value="2">Tháng 2</option>
          <option value="3">Tháng 3</option>
          <option value="4">Tháng 4</option>
          <option value="5">Tháng 5</option>
          <option value="6">Tháng 6</option>
          <option value="7">Tháng 7</option>
          <option value="8">Tháng 8</option>
          <option value="9">Tháng 9</option>
          <option value="10">Tháng 10</option>
          <option value="11">Tháng 11</option>
          <option value="12">Tháng 12</option>
        </select>
      </label>
      <p id="rangeNote" class="range-note"></p>
    </section>

    <section id="summary" class="summary-grid" aria-label="Tóm tắt tháng"></section>

    <section class="card chart-card">
      <div class="section-heading">
        <p class="eyebrow">COMPARISON</p>
        <h2>Chây đờ và BTC</h2>
      </div>
      <div class="chart-wrap chart-wrap-large"><canvas id="compareChart"></canvas></div>
    </section>

    <div class="chart-grid">
      <section class="card chart-card">
        <div class="section-heading">
          <p class="eyebrow">CHÂY ĐỜ</p>
          <h2>wenveebowf</h2>
        </div>
        <div class="chart-wrap"><canvas id="meChart"></canvas></div>
      </section>

      <section class="card chart-card">
        <div class="section-heading">
          <p class="eyebrow">BTC</p>
          <h2>Bố của ma kẹc</h2>
        </div>
        <div class="chart-wrap"><canvas id="btcChart"></canvas></div>
      </section>
    </div>

    <section class="card analysis-card">
      <div class="section-heading">
        <p class="eyebrow">LAG ANALYSIS</p>
        <h2>Đồng và nghịch</h2>
      </div>
      <div id="analysis"></div>
    </section>

    <footer id="dataSource"></footer>
  </main>
</body>
</html>
